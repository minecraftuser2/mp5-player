<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MP5 Engineering Terminal</title>
    <style>
        :root { --matrix: #00ff41; --bg: #050505; --panel: #0a150a; }
        body { background: var(--bg); color: var(--matrix); font-family: 'Consolas', 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        
        .container { display: flex; gap: 30px; max-width: 1100px; width: 100%; }
        .panel {
            flex: 1;
            background: var(--panel);
            border: 1px solid var(--matrix);
            border-radius: 4px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.1);
        }
        
        h2 { text-transform: uppercase; letter-spacing: 4px; border-bottom: 1px solid var(--matrix); padding-bottom: 10px; margin-bottom: 25px; }
        video { width: 100%; background: #000; border: 1px solid #222; border-radius: 2px; margin-top: 15px; }
        
        .action-btn {
            display: inline-block;
            background: var(--matrix);
            color: #000;
            padding: 15px 30px;
            margin: 20px 0;
            border-radius: 2px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .action-btn:hover { background: #fff; box-shadow: 0 0 20px var(--matrix); }
        
        input[type="file"] { display: none; }
        .status { font-size: 0.8rem; color: var(--matrix); opacity: 0.7; margin-top: 15px; border-top: 1px hideen #333; padding-top: 10px; }
        
        .glitch { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <h1 class="glitch" style="margin-bottom: 50px; letter-spacing: 8px;">MP5 SYSTEM INTERFACE</h1>

    <div class="container">
        <div class="panel">
            <h2>Encoder</h2>
            <p>Target: MP5 Proprietary Format</p>
            
            <label for="convInput" class="action-btn">Initialize Conversion</label>
            <input type="file" id="convInput" accept="video/mp4,video/quicktime">
            
            <div id="convStatus" class="status">System Idle...</div>
        </div>

        <div class="panel">
            <h2>Media Player</h2>
            <p>Source: .MP5 Encrypted Stream</p>
            
            <video id="mp5Video" controls></video>
            
            <label for="playInput" class="action-btn">Load MP5 Data</label>
            <input type="file" id="playInput" accept=".mp5">
            
            <div id="playStatus" class="status">Awaiting Valid Stream...</div>
        </div>
    </div>

<script>
    const SIG = "MP5!";

    // --- ENCODING ENGINE ---
    document.getElementById('convInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const status = document.getElementById('convStatus');
        status.innerText = "READING SOURCE BINARY...";

        const buffer = await file.arrayBuffer();
        const sigBlob = new Blob([SIG]);
        const outputBlob = new Blob([sigBlob, buffer], { type: 'application/octet-stream' });

        const link = document.createElement('a');
        link.href = URL.createObjectURL(outputBlob);
        link.download = file.name.split('.')[0] + ".mp5";
        link.click();

        status.innerText = `ENCODING COMPLETE: ${link.download}`;
    });

    // --- DECODING PLAYER ---
    document.getElementById('playInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        const video = document.getElementById('mp5Video');
        const status = document.getElementById('playStatus');
        if (!file) return;

        const buffer = await file.arrayBuffer();
        const view = new DataView(buffer);

        let check = "";
        try {
            for(let i=0; i<4; i++) check += String.fromCharCode(view.getUint8(i));
        } catch(err) { check = ""; }

        if (check === SIG) {
            status.innerHTML = "PROTOCOL VERIFIED. DECODING STREAM...";
            
            const stream = buffer.slice(4);
            const blob = new Blob([stream], { type: 'video/mp4' });
            video.src = URL.createObjectURL(blob);
            video.play();
        } else {
            status.innerHTML = "<span style='color:#ff0000'>CRITICAL ERROR: INVALID MP5 STRUCTURE</span>";
            video.src = "";
        }
    });
</script>

</body>
</html>
